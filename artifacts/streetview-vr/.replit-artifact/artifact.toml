kind = "web"
previewPath = "/"
title = "Street View VR"
version = "1.0.0"
id = "artifacts/streetview-vr"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20561

[services.development]
run = "pnpm --filter @workspace/streetview-vr run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/streetview-vr", "run", "build" ]
publicDir = "artifacts/streetview-vr/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20561"
BASE_PATH = "/"
